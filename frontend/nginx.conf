# Static SPA serving for the eval frontend container.
# The edge nginx (db8r-deploy) reverse-proxies / -> this container and /api/ -> eval-api.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA client-side routing: unknown paths fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed build assets.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
